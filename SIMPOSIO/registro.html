<div class="container-fluid mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width:600px;">
        <h3 class="text-center mb-4">Registro de Usuario</h3>

        <form action="registrar.php" method="POST">

            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Apellidos</label>
                <input type="text" name="apellidos" class="form-control">
            </div>

            <div class="mb-3">
                <label>Correo</label>
                <input type="email" name="correo" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Dirección</label>
                <input type="text" name="direccion" class="form-control">
            </div>

            <div class="mb-3">
                <label>Tipo de Usuario</label>
                <select name="tipo_usuario" id="tipo_usuario" class="form-control" required>
                    <option>Seleccionar</option>
                    <option value="alumno">Alumno</option>
                    <option value="docente">Docente</option>
                    <option value="empresa">Empresa</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div id="campos_alumno" style="display:none;">
                <div class="mb-3">
                    <label>Matrícula</label>
                    <input type="text" name="matricula" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Carrera</label>
                    <input type="text" name="carrera" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Semestre</label>
                    <input type="text" name="semestre" class="form-control">
                </div>
            </div>
                
            <div id="campos_docente" style="display:none;">
                <div class="mb-3">
                    <label>Especialidad</label>
                    <input type="text" name="especialidad" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Grado Academico</label>
                    <input type="text" name="grado_academico" class="form-control">
                </div>
            </div>
                
            <div id="campos_empresa" style="display:none;">
                <div class="mb-3">
                    <label>Nombre de la Empresa</label>
                    <input type="text" name="nombre_empresa" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Sector</label>
                    <input type="text" name="sector" class="form-control">
                </div>
            </div>
                
            <button type="submit" class="btn btn-dark w-100">
                Registrarse
            </button>

        </form>

        <div class="text-center mt-3">
            <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </div>
</div>

<script>
document.getElementById("tipo_usuario").addEventListener("change", function(){

    document.getElementById("campos_alumno").style.display = "none";
    document.getElementById("campos_docente").style.display = "none";
    document.getElementById("campos_empresa").style.display = "none";

    if(this.value === "alumno"){
        document.getElementById("campos_alumno").style.display = "block";
    }
    else if(this.value === "docente"){
        document.getElementById("campos_docente").style.display = "block";
    }
    else if(this.value === "empresa"){
        document.getElementById("campos_empresa").style.display = "block";
    }
});
</script>
